<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f8fafc; font-family:'Inter',sans-serif; }

  header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid #4ade80;
  }
  header h1 { color:#fff; font-size:1.3rem; font-weight:700; }
  header h1 span { color:#4ade80; }
  header p { color:#94a3b8; font-size:.78rem; margin-top:2px; }

  .legend {
    display: flex; gap: 20px; flex-wrap: wrap;
    padding: 12px 32px; background: #fff;
    border-bottom: 1px solid #e2e8f0;
    align-items: center;
  }
  .legend-title { font-size:.72rem; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; margin-right:4px; }
  .leg { display:flex; align-items:center; gap:6px; font-size:.75rem; color:#475569; }

  .erd-wrap {
    overflow: auto;
    padding: 24px 32px 48px;
    background: #f8fafc;
  }

  .erd-canvas {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
    display: inline-block;
  }

  svg text { font-family: 'Inter', sans-serif; }

  .note {
    background: #fffbeb; border: 1px solid #fde68a;
    border-radius: 8px; padding: 10px 20px;
    font-size: .78rem; color: #92400e;
    margin: 0 32px 16px; display: inline-flex; align-items: center; gap: 8px;
  }
</style>
</head>
